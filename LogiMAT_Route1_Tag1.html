<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#E87800"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>LogiMAT 2026 — Route 1 · Tag 1</title>
<style>



*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;position:relative;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F2F4F7;display:flex;flex-direction:column;height:100%;}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.header{background:linear-gradient(135deg,#E87800,#C04000);color:#fff;padding:12px 16px;flex-shrink:0;}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.header h1{font-size:20px;font-weight:900;letter-spacing:-0.5px;}
.header h1 em{font-style:italic;}
.header .sub{font-size:10px;letter-spacing:2px;opacity:.8;text-transform:uppercase;margin-bottom:2px;}
.header .meta{font-size:11px;opacity:.85;margin-top:2px;}
.tab-bar{display:flex;gap:6px;}
.tab-btn{touch-action:manipulation;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-weight:700;font-size:12px;cursor:pointer;}
.tab-btn.active{background:rgba(255,255,255,.95);color:#C04000;}
.progress-bar-wrap{background:#fff;border-bottom:1px solid #E0E4EC;padding:10px 16px;flex-shrink:0;}
.progress-text{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px;}
.progress-text span.pct{font-weight:700;color:#E87800;}
.progress-track{height:4px;background:#EEE;border-radius:2px;margin-bottom:8px;}
.progress-fill{height:100%;background:linear-gradient(90deg,#E87800,#DAA520);border-radius:2px;transition:width .4s;}
.stop-dots{display:flex;gap:5px;flex-wrap:wrap;}
.stop-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;border:2px solid #CCC;background:#E8E8E8;color:#666;transition:all .2s;flex-shrink:0;}
.stop-dot.done{background:#C8E6C9;border-color:#81C784;color:#2E7D32;}
.stop-dot.active{border-color:#555;color:#fff;}
.main{flex:1;display:flex;overflow:hidden;position:relative;}
/* MAP VIEW */
#map-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:12px;display:none;}
#map-view.visible{display:block;}
.map-card{background:#fff;border-radius:12px;padding:14px;border:1px solid #E0E4EC;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.legend-title{font-size:10px;font-weight:700;color:#AAA;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#555;}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;border:1px solid rgba(0,0,0,.1);}
#hall-map{width:100%;display:block;margin:0 auto;max-width:600px;user-select:none;-webkit-user-select:none;}
.map-hint{text-align:center;font-size:10px;color:#AAA;margin-top:6px;}
/* DETAIL PANEL */
#detail-panel{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:340px;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.15);overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;-webkit-transform:translateX(100%);transform:translateX(100%);transition:-webkit-transform .25s ease,transform .25s ease;z-index:100;padding:18px;}
#detail-panel.open{-webkit-transform:translateX(0);transform:translateX(0);}
@media(min-width:700px){
  #detail-panel{position:relative;transform:none;box-shadow:none;border-left:1px solid #E0E4EC;transition:none;display:none;overflow-y:auto;}
  #detail-panel.open{display:block;transform:none;}
  #map-view.visible{flex:1;overflow-y:auto;}
  .main{overflow:hidden;}
}
.panel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.panel-badge{display:inline-block;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:800;color:#fff;margin-bottom:4px;}
.panel-highlight{font-size:10px;background:#FFF9C4;color:#B8860B;border-radius:4px;padding:2px 6px;font-weight:700;margin-left:4px;}
.close-btn{touch-action:manipulation;background:none;border:none;font-size:22px;color:#AAA;cursor:pointer;padding:0 4px;line-height:1;}
.panel-firm{font-size:16px;font-weight:900;margin-bottom:2px;}
.panel-stand{font-size:11px;font-weight:700;color:#E87800;margin-bottom:4px;}
.panel-halledesc{font-size:10px;color:#888;background:#F5F5F5;border-radius:6px;padding:5px 9px;margin-bottom:12px;line-height:1.5;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.info-box{background:#F8F8F8;border-radius:8px;padding:9px 10px;border:1px solid #EEE;}
.info-icon{font-size:14px;margin-bottom:2px;}
.info-label{font-size:9px;color:#AAA;text-transform:uppercase;letter-spacing:1px;}
.info-val{font-size:11px;font-weight:700;color:#1A1A1A;margin-top:1px;line-height:1.3;}
.ziel-box{background:#F0FBF0;border-radius:8px;padding:11px;margin-bottom:8px;border:1px solid #C8E6C9;}
.ziel-box .lbl{font-size:10px;color:#2E7D32;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.ziel-box p{font-size:12px;color:#1A1A1A;line-height:1.6;}
.tipp-box{background:#FFFDE7;border-radius:8px;padding:11px;margin-bottom:12px;border:1px solid #FDD835;}
.tipp-box .lbl{font-size:10px;color:#B8860B;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.tipp-box p{font-size:12px;color:#5D4037;line-height:1.6;font-style:italic;}
.note-box{background:#F5F0FF;border-radius:8px;padding:11px;margin-bottom:12px;border:1px solid #D1B3FF;}
.note-box .lbl{font-size:10px;color:#6A0DAD;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.note-box textarea{width:100%;min-height:90px;padding:8px 10px;border:1px solid #D1B3FF;border-radius:7px;background:#fff;font-family:inherit;font-size:16px;line-height:1.6;color:#333;resize:vertical;-webkit-appearance:none;}
.note-box textarea:focus{outline:2px solid #E87800;border-color:#E87800;}
.btn-row{display:flex;gap:7px;margin-bottom:10px;}
.btn-done{touch-action:manipulation;flex:1;background:#4CAF50;color:#fff;border:1px solid transparent;border-radius:8px;padding:11px 0;font-weight:800;font-size:12px;cursor:pointer;}
.btn-done.is-done{background:#E8F5E9;color:#2E7D32;border-color:#A5D6A7;}
.btn-next{background:#F5F5F5;border:1px solid #DDD;border-radius:8px;padding:11px 14px;font-weight:700;font-size:14px;cursor:pointer;color:#333;}
.next-hint{background:#F5F5F5;border-radius:8px;padding:9px 11px;font-size:11px;border:1px solid #E8E8E8;}
.next-hint .lbl{color:#E87800;font-weight:700;}
/* LIST VIEW */
#list-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:12px;display:none;}
#list-view.visible{display:block;}
.section-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #E0E4EC;}
.section-title{font-size:10px;font-weight:700;color:#AAA;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.hall-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.hall-chip{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#F8F8F8;border-radius:6px;border:1px solid #EEE;}
.hall-chip-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.hall-chip-name{font-size:10px;font-weight:700;color:#333;}
.hall-chip-desc{font-size:9px;color:#777;}
.stop-card{background:#fff;border-radius:10px;margin-bottom:7px;border:1.5px solid #E0E4EC;cursor:pointer;transition:all .15s;overflow:hidden;}
.stop-card.active-card{border-color:#E87800;}
.stop-card-head{display:flex;align-items:center;gap:10px;padding:11px 14px;}
.stop-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#fff;flex-shrink:0;}
.stop-info{flex:1;}
.stop-name-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.stop-name{font-weight:800;font-size:14px;color:#1A1A1A;}
.stop-name.faded{color:#555;}
.stop-badge-hl{font-size:9px;background:#FFF9C4;color:#B8860B;border-radius:4px;padding:1px 5px;font-weight:700;}
.stop-badge-note{font-size:9px;background:#F5F0FF;color:#6A0DAD;border-radius:4px;padding:1px 5px;font-weight:700;}
.stop-meta{font-size:10px;color:#999;}
.abhaken-btn{touch-action:manipulation;background:#F5F5F5;color:#888;border:1px solid #DDD;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;}
.abhaken-btn.done{background:#E8F5E9;color:#2E7D32;border-color:#A5D6A7;}
.stop-card-detail{padding:0 14px 12px;border-top:1px solid #F0F0F0;}
.stop-card-detail .ziel-line{padding-top:9px;font-size:12px;color:#333;margin-bottom:7px;line-height:1.6;}
.stop-card-detail .ziel-line b{color:#2E7D32;}
.stop-card-detail .tipp-line{font-size:11px;color:#5D4037;font-style:italic;background:#FFFDE7;padding:8px 10px;border-radius:7px;border:1px solid #FDD835;margin-bottom:8px;}
.stop-card-detail .tipp-line b{color:#B8860B;font-style:normal;}
.note-inline{background:#F5F0FF;border-radius:7px;padding:8px 10px;border:1px solid #D1B3FF;}
.note-inline .lbl{font-size:9px;color:#6A0DAD;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.note-inline textarea{width:100%;min-height:70px;padding:7px 9px;border:1px solid #D1B3FF;border-radius:6px;background:#fff;font-family:inherit;font-size:16px;line-height:1.5;color:#333;resize:vertical;-webkit-appearance:none;}
.note-inline textarea:focus{outline:2px solid #E87800;border-color:#E87800;}
.tagesplan-box{background:#FFF8F0;border-radius:10px;padding:12px;border:1px solid #FFD8A0;margin-top:6px;}
.tagesplan-box h3{font-size:13px;font-weight:800;color:#C04000;margin-bottom:8px;}
.tp-row{display:flex;gap:10px;margin-bottom:5px;}
.tp-time{font-size:11px;font-weight:700;color:#E87800;min-width:38px;}
.tp-desc{font-size:11px;color:#555;}
/* STOP BAR */
#stop-bar{background:#fff;border-top:1px solid #E0E4EC;padding:8px 10px;display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;}
.stop-bar-btn{touch-action:manipulation;flex-shrink:0;background:#F8F8F8;border:1px solid #E0E0E0;border-radius:8px;padding:5px 9px;cursor:pointer;text-align:left;min-width:82px;position:relative;}
.stop-bar-btn.active{color:#fff;}
.stop-bar-btn.sdone{background:#E8F5E9;border-color:#A5D6A7;}
.stop-bar-btn .sb-meta{font-size:9px;color:#AAA;margin-bottom:1px;}
.stop-bar-btn .sb-name{font-size:11px;font-weight:800;color:#1A1A1A;line-height:1.2;}
.stop-bar-btn.sdone .sb-name{color:#2E7D32;}
.stop-bar-btn.active .sb-meta,.stop-bar-btn.active .sb-name,.stop-bar-btn.active .sb-hall{color:rgba(255,255,255,.9)!important;}
.stop-bar-btn .sb-hall{font-size:9px;color:#AAA;margin-top:1px;}
.note-dot{position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:#6A0DAD;}

/* FOTO SECTION */
.foto-box{background:#FFF0F5;border-radius:8px;padding:11px;margin-bottom:12px;border:1px solid #FFB3C6;}
.foto-box .lbl{font-size:10px;color:#C2185B;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.foto-thumb{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#F5F5F5;border:1px solid #EEE;}
.foto-thumb img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
.foto-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.foto-dl{position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:4px;padding:2px 4px;font-size:9px;cursor:pointer;}
.foto-btn-row{display:flex;gap:6px;}
.foto-btn{touch-action:manipulation;flex:1;padding:8px 0;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;}
.foto-btn.kamera{background:#C2185B;color:#fff;}
.foto-btn.galerie{background:#F5F5F5;color:#555;border:1px solid #DDD;}
.foto-count{font-size:10px;color:#999;margin-top:4px;text-align:center;}
#lightbox{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:500;align-items:center;justify-content:center;flex-direction:column;}
#lightbox.open{display:flex;}
#lightbox img{max-width:95vw;max-height:80vh;border-radius:8px;object-fit:contain;}
#lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;}
#lightbox-dl{margin-top:12px;background:#fff;color:#333;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;}
#custom-view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:12px;display:none;}
#custom-view.visible{display:block;}
.custom-form{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid #E0E4EC;}
.custom-form h3{font-size:13px;font-weight:800;color:#333;margin-bottom:12px;}
.form-row{margin-bottom:10px;}
.form-row label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border:1px solid #DDD;border-radius:7px;font-family:inherit;font-size:16px;color:#333;background:#fff;-webkit-appearance:none;}
.form-row input:focus,.form-row textarea:focus{outline:2px solid #6A0DAD;border-color:#6A0DAD;}
.form-row textarea{min-height:60px;resize:vertical;}
.add-btn{touch-action:manipulation;width:100%;padding:11px;background:#6A0DAD;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;}
.custom-stop-card{background:#fff;border-radius:10px;margin-bottom:8px;border:1.5px solid #E0E4EC;overflow:hidden;}
.custom-stop-card.active-card{border-color:#6A0DAD;}
.custom-card-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;}
.custom-num{width:32px;height:32px;border-radius:50%;background:#6A0DAD;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0;}
.custom-num.done{background:#4CAF50;}
.custom-info{flex:1;}
.custom-name{font-weight:800;font-size:14px;color:#1A1A1A;}
.custom-meta{font-size:10px;color:#999;margin-top:2px;}

.custom-edit-btn{background:#EEF2FF;color:#3949AB;border:1px solid #C5CAE9;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;}
.custom-del-btn{background:#FFF0F0;color:#CC2200;border:1px solid #FFCDD2;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;flex-shrink:0;}
.custom-card-detail{padding:0 14px 14px;border-top:1px solid #F0F0F0;}
.empty-custom{text-align:center;padding:40px 20px;color:#AAA;}
.empty-custom .icon{font-size:40px;margin-bottom:12px;}
.empty-custom p{font-size:13px;line-height:1.6;}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.78);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}


#save-btn.saved{background:rgba(255,255,255,0.95);color:#2E7D32;}
#save-indicator{font-size:10px;opacity:0.75;margin-top:2px;}

/* KONTAKT */
.kontakt-box{background:#E3F2FD;border-radius:8px;padding:11px;margin-bottom:12px;border:1px solid #90CAF9;}
.kontakt-box .lbl{font-size:10px;color:#1565C0;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.kontakt-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
.kontakt-input{width:100%;padding:8px 10px;border:1px solid #90CAF9;border-radius:7px;font-family:inherit;font-size:16px;color:#333;background:#fff;-webkit-appearance:none;box-sizing:border-box;}
.kontakt-input:focus{outline:2px solid #1565C0;border-color:#1565C0;}
.kontakt-full{grid-column:1/-1;}
/* EXPORT */
#export-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:700;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;}
#export-overlay.open{display:flex;}
#export-box{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;}
#export-header{padding:16px 18px 12px;border-bottom:1px solid #EEE;display:flex;justify-content:space-between;align-items:center;}
#export-header h3{font-size:15px;font-weight:900;margin:0;}
#export-close{background:none;border:none;font-size:22px;color:#AAA;cursor:pointer;touch-action:manipulation;}
#export-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
#export-text{width:100%;min-height:200px;font-family:monospace;font-size:12px;border:1px solid #DDD;border-radius:8px;padding:10px;resize:none;box-sizing:border-box;background:#F8F8F8;}
#export-btns{padding:12px 16px;border-top:1px solid #EEE;display:flex;gap:8px;}
.export-btn{flex:1;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;touch-action:manipulation;}
.export-btn.copy{background:#1565C0;color:#fff;}
.export-btn.dl{background:#F5F5F5;color:#333;border:1px solid #DDD;}






.tab-btn-icon{padding:6px 10px!important;font-size:16px!important;}
</style>
</head>
<body>
<div id="app">
<div class="header">
  <div class="sub">24.–26. März 2026 · Messe Stuttgart</div>
  <div class="header-top">
    <div><h1>Logi<em>MAT</em> 2026 — Route 1 · Tag 1</h1><div class="meta" id="header-meta"></div></div>
    <div id="save-indicator"></div>
    <div class="tab-bar">
      <button class="tab-btn active" id="btn-map" onclick="switchTab('map')">🗺 Karte</button>
      <button class="tab-btn" id="btn-list" onclick="switchTab('list')">📋 Liste</button>
      <button class="tab-btn" id="btn-custom" onclick="switchTab('custom')">🏭 Eigene</button>
      <button class="tab-btn tab-btn-icon" id="export-trigger" onclick="openExport()" title="Zusammenfassung">📊</button>
      <button class="tab-btn tab-btn-icon" id="save-btn" onclick="manualSave()" title="Speichern">💾</button>
    </div>
  </div>
</div>

<div class="progress-bar-wrap"><div class="progress-text"><span id="prog-text"></span><span class="pct" id="prog-pct"></span></div><div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div><div class="stop-dots" id="stop-dots"></div></div>
<div class="main">
  <div id="map-view" class="visible"><div class="map-card"><div class="legend-title">Ausstellungsbereiche</div><div class="legend" id="legend"></div><svg id="hall-map" viewBox="0 0 310 200"></svg><div class="map-hint">Halle oder Stop antippen für Details</div></div></div>
  <div id="detail-panel">
    <div class="panel-header"><div><div class="panel-badge" id="dp-badge"></div><span class="panel-highlight" id="dp-hl" style="display:none">⭐ Highlight</span></div><button class="close-btn" onclick="closePanel()">✕</button></div>
    <div class="panel-firm" id="dp-firm"></div>
    <div class="panel-stand" id="dp-stand"></div>
    <div class="panel-halledesc" id="dp-halledesc"></div>
    <div class="info-grid"><div class="info-box"><div class="info-icon">🎯</div><div class="info-label">Thema</div><div class="info-val" id="dp-thema"></div></div></div>
    <div id="dp-detail-content"></div>
    <div class="btn-row"><button class="btn-done" id="dp-done-btn" onclick="toggleDoneActive()">Als besucht markieren</button><button class="btn-next" id="dp-next-btn" onclick="nextStop()">→</button></div>
    <div class="next-hint" id="dp-next-hint"></div>
  </div>
  <div id="list-view">
    <div class="section-card"><div class="section-title">Themenübersicht nach Hallen</div><div class="hall-grid" id="hall-grid"></div></div>
    <div id="list-stops"></div>
    <div class="tagesplan-box"><h3>⏰ Empfohlener Tagesplan</h3><div id="tagesplan"></div></div>
  </div>

// ── State ─────────────────────────────────────────────────────────────────────

const SK='lm_r1_v3';

function saveState(){
  try{
    localStorage.setItem(SK,JSON.stringify({done:[...state.done],notes:state.notes,saved:Date.now()}));
    showSaveIndicator();
  }catch(e){console.warn('Speichern fehlgeschlagen');}
}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem(SK)||'{}');

  }catch(e){}
}

// ── Fotos ──────────────────────────────────────────────────────────────────
const MAX_FOTOS=10;
function fotoKey(n){return 'foto_r1_stop_'+n;}
function getFotos(n){try{return JSON.parse(localStorage.getItem(fotoKey(n))||'[]');}catch(e){return[];}}
function saveFotos(n,arr){try{localStorage.setItem(fotoKey(n),JSON.stringify(arr));showSaveIndicator();}catch(e){showToast('Speicher voll!');}}

function renderFotoGrid(n, gridId, cntId){
  const grid=document.getElementById(gridId);
  const cnt=document.getElementById(cntId);
  if(!grid) return;
  const fotos=getFotos(n);
  grid.innerHTML='';
  fotos.forEach((src,i)=>{
    const w=document.createElement('div'); w.className='foto-thumb';
    const img=document.createElement('img'); img.src=src; img.addEventListener('click',()=>openLightbox(src));
    const d=document.createElement('button'); d.className='foto-del'; d.textContent='✕';
    d.addEventListener('click',e=>{e.stopPropagation();const f=getFotos(n);f.splice(i,1);saveFotos(n,f);renderAllFotos(n);});
    const dl=document.createElement('button'); dl.className='foto-dl'; dl.textContent='⬇';
    dl.addEventListener('click',e=>{e.stopPropagation();dlFoto(src,i);});
    w.appendChild(img); w.appendChild(d); w.appendChild(dl); grid.appendChild(w);
  });
  if(cnt) cnt.textContent=fotos.length?fotos.length+'/'+MAX_FOTOS+' Fotos':'';
}
function renderAllFotos(n){
  // Re-render in all possible containers for this stop
  renderFotoGrid(n,'fg-panel-'+n,'fc-panel-'+n);
  renderFotoGrid(n,'fg-list-'+n,'fc-list-'+n);
}
function handleFotoInput(input, n){
  const fotos=getFotos(n);
  Array.from(input.files).forEach(file=>{
    if(fotos.length>=MAX_FOTOS){showToast('Max 10 Fotos pro Stand');return;}
    const r=new FileReader();
    r.onload=e=>{fotos.push(e.target.result);saveFotos(n,fotos);renderAllFotos(n);};
    r.readAsDataURL(file);
  });
  input.value='';
}
function dlFoto(src,i){const a=document.createElement('a');a.href=src;a.download='LogiMAT_Foto_'+(i+1)+'.jpg';a.click();}

function buildStopDetailContent(n, suffix){
  // suffix = 'panel' or 'list-N'

  if(!stop) return document.createElement('div');
  const isDone=state.done.has(n);

  const wrap=document.createElement('div');

  // Done button
  const db=document.createElement('button');
  db.className='btn-done'+(isDone?' is-done':'');
  db.textContent=isDone?'✓ Besucht':'Als besucht markieren';

    if(state.done.has(n)) state.done.delete(n); else state.done.add(n);
    saveState(); updateProgress(); buildStopBar(); buildMap();
    // Refresh all expanded views
    if(state.active===n) openStop(n);
    buildStopCards();
  });
  wrap.appendChild(db);

  // Ziel
  const zl=document.createElement('div'); zl.className='ziel-box';
  zl.innerHTML='<div class="lbl">✅ Ziel dieses Besuchs</div><p>'+stop.z+'</p>';
  wrap.appendChild(zl);

  // Tipp
  const tl=document.createElement('div'); tl.className='tipp-box';
  tl.innerHTML='<div class="lbl">💡 Profi-Tipp</div><p>'+stop.tip+'</p>';
  wrap.appendChild(tl);

  // Kontakt
  const kb=document.createElement('div'); kb.className='kontakt-box';
  const kid='kw-'+suffix+'-'+n;
  kb.innerHTML='<div class="lbl">👤 Ansprechpartner</div><div id="'+kid+'"></div>';
  wrap.appendChild(kb);

  const ni=document.createElement('div'); ni.className='note-box';
  ni.innerHTML='<div class="lbl">📝 Meine Notizen</div>';
  const ta=document.createElement('textarea');
  ta.value=state.notes[n]||''; ta.placeholder='Notizen, Gesprächspunkte, Eindrücke...';
  ta.addEventListener('click',e=>e.stopPropagation());
  ta.addEventListener('input',e=>{state.notes[n]=e.target.value;saveState();});
  ni.appendChild(ta); wrap.appendChild(ni);

  // Fotos
  const fgId='fg-'+suffix.split('-')[0]+'-'+n;
  const fcId='fc-'+suffix.split('-')[0]+'-'+n;
  const fb=document.createElement('div'); fb.className='foto-box';
  fb.innerHTML=`<div class="lbl">📸 Fotos</div>
    <div class="foto-grid" id="${fgId}"></div>
    <div class="foto-count" id="${fcId}"></div>
    <div class="foto-btn-row">
      <button class="foto-btn kamera" onclick="document.getElementById('fi-cam-${suffix}-${n}').click()">📷 Foto aufnehmen</button>
      <button class="foto-btn galerie" onclick="document.getElementById('fi-gal-${suffix}-${n}').click()">🖼 Aus Galerie</button>
    </div>
    <input type="file" id="fi-cam-${suffix}-${n}" accept="image/*" capture="environment" style="display:none" onchange="handleFotoInput(this,${n})"/>
    <input type="file" id="fi-gal-${suffix}-${n}" accept="image/*" style="display:none" onchange="handleFotoInput(this,${n})"/>`;
  wrap.appendChild(fb);
  setTimeout(()=>renderFotoGrid(n,fgId,fcId),0);

  return wrap;
}

// ── Map / SVG ─────────────────────────────────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  (children||[]).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
}

function buildMap(){
  const svg=document.getElementById('hall-map');
  svg.innerHTML='';
  const defs=el('defs',{});
  const f=el('filter',{id:'ds'});
  f.appendChild(el('feDropShadow',{dx:'0',dy:'1',stdDeviation:'1.5',floodOpacity:'0.18'}));
  defs.appendChild(f); svg.appendChild(defs);
  svg.appendChild(el('rect',{width:'310',height:'200',fill:'#E8EDF0',rx:'8'}));
  svg.appendChild(el('rect',{x:'0',y:'102',width:'310',height:'10',fill:'#B8CEB4'}));
  svg.appendChild(el('text',{x:'155',y:'109',fill:'#5A7A52','font-size':'5','text-anchor':'middle','font-weight':'600'},['Messepark']));
  svg.appendChild(el('text',{x:'305',y:'68',fill:'#E87800','font-size':'4.8','text-anchor':'end','font-weight':'700'},['EINGANG OST ↓']));
  svg.appendChild(el('text',{x:'5',y:'68',fill:'#555','font-size':'4.8','font-weight':'700'},['← EINGANG WEST']));
  svg.appendChild(el('rect',{x:'240',y:'22',width:'58',height:'8',fill:'#E87800',rx:'2'}));
  svg.appendChild(el('text',{x:'269',y:'28',fill:'#fff','font-size':'4.5','text-anchor':'middle','font-weight':'700'},['Galerie / Gallery']));
  svg.appendChild(el('rect',{x:'284',y:'116',width:'18',height:'60',fill:'#444',rx:'3'}));
  const icsT=el('text',{x:'293',y:'148',fill:'#fff','font-size':'4.5','text-anchor':'middle',transform:'rotate(-90,293,148)'},['ICS']);
  svg.appendChild(icsT);
  SVG_HALLS.forEach(h=>renderHall(svg,h));
  renderRouteLines(svg);
  renderStopDots(svg);
}

function renderHall(svg,hall){
  const {id,x,y,w,h}=hall;
  const th=HALL[id];
  const hasStop=STOPS.some(s=>s.h===id);
  const isAct=state.active&&STOPS.find(s=>s.n===state.active)?.h===id;
  const allDone=hasStop&&STOPS.filter(s=>s.h===id).every(s=>state.done.has(s.n));
  const g=el('g',{filter:'url(#ds)',style:hasStop?'cursor:pointer':''});
  if(hasStop) g.addEventListener('click',()=>{const f=STOPS.find(s=>s.h===id);if(f)openStop(f.n);});

  if(id===7){
    g.appendChild(el('rect',{x,y,width:w,height:h,fill:isAct?'#1565C0':'#1976D2',rx:4}));
    g.appendChild(el('rect',{x,y,width:w,height:h*0.45,fill:isAct?'#ECC225':'#DAA520',rx:4}));
    if(isAct) g.appendChild(el('rect',{x,y,width:w,height:h,fill:'none',stroke:'#fff','stroke-width':2.5,rx:4}));
  } else if(id===9){
    g.appendChild(el('rect',{x,y,width:w,height:h,fill:isAct?'#9B5E2A':'#8B4513',rx:4}));
    g.appendChild(el('rect',{x,y,width:w,height:h*0.28,fill:isAct?'#ECC225':'#DAA520',rx:4}));
    g.appendChild(el('rect',{x:x+w*0.57,y,width:w*0.43,height:h*0.28,fill:'#2E6B2E',rx:3}));
    if(isAct) g.appendChild(el('rect',{x,y,width:w,height:h,fill:'none',stroke:'#fff','stroke-width':2.5,rx:4}));
  } else if(id===6){
    g.appendChild(el('rect',{x,y,width:w,height:h,fill:isAct?'#E03320':'#CC2200',rx:4}));
    g.appendChild(el('polygon',{points:`${x+8},${y+h} ${x+22},${y} ${x+34},${y} ${x+20},${y+h}`,fill:'#6DC46D',opacity:'0.9'}));
    if(isAct) g.appendChild(el('rect',{x,y,width:w,height:h,fill:'none',stroke:'#fff','stroke-width':2.5,rx:4}));
  } else {
    const fill=allDone?'#4CAF5033':isAct?th.c+'EE':hasStop?th.c+'BB':th.c+'44';
    g.appendChild(el('rect',{x,y,width:w,height:h,fill,stroke:isAct?'#fff':allDone?'#4CAF50':th.c,'stroke-width':isAct?2.5:1.5,rx:4}));
  }
  g.appendChild(el('text',{x:x+w/2,y:y+h/2+5,fill:hasStop?'#fff':'#aaa','font-size':11,'text-anchor':'middle','font-weight':900,filter:'url(#ds)'},[String(id)]));
  svg.appendChild(g);
}

function renderRouteLines(svg){
  STOPS.slice(0,-1).forEach((s,i)=>{
    const nx=STOPS[i+1];
    const p1=STOP_POS[s.n], p2=STOP_POS[nx.n];
    const both=state.done.has(s.n)&&state.done.has(nx.n);
    svg.appendChild(el('line',{x1:p1.x,y1:p1.y,x2:p2.x,y2:p2.y,stroke:both?'#4CAF50':'#E87800','stroke-width':both?1.5:1,'stroke-dasharray':both?'none':'4 2',opacity:both?0.9:0.5}));
  });
}

function renderStopDots(svg){
  STOPS.forEach(stop=>{
    const pos=STOP_POS[stop.n];
    const isAct=state.active===stop.n;
    const isDone=state.done.has(stop.n);
    const color=THEME_C[stop.t]||HALL[stop.h].c;
    const g=el('g',{style:'cursor:pointer'});
    g.addEventListener('click',()=>openStop(stop.n));
    if(isAct){
      const anim=el('circle',{cx:pos.x,cy:pos.y,r:'11',fill:'none',stroke:color,'stroke-width':'1.5',opacity:'0.4'});
      const a=document.createElementNS('http://www.w3.org/2000/svg','animate');
      a.setAttribute('attributeName','r');a.setAttribute('values','9;13;9');a.setAttribute('dur','1.8s');a.setAttribute('repeatCount','indefinite');
      anim.appendChild(a); g.appendChild(anim);
    }
    if(stop.hl&&!isDone){
      const hl=el('circle',{cx:pos.x,cy:pos.y,r:'10',fill:'none',stroke:'#FFD700','stroke-width':'1.2',opacity:'0.7'});
      const a=document.createElementNS('http://www.w3.org/2000/svg','animate');
      a.setAttribute('attributeName','r');a.setAttribute('values','8;12;8');a.setAttribute('dur','2s');a.setAttribute('repeatCount','indefinite');
      hl.appendChild(a); g.appendChild(hl);
    }
    g.appendChild(el('circle',{cx:pos.x,cy:pos.y,r:isAct?8:6.5,fill:isDone?'#4CAF50':isAct?'#fff':color,stroke:isAct?color:isDone?'#2E7D32':'rgba(255,255,255,0.9)','stroke-width':isAct?2.5:1.5,filter:'url(#ds)'}));
    g.appendChild(el('text',{x:pos.x,y:pos.y+3,fill:isDone?'#fff':isAct?color:'#fff','font-size':isAct?7:6,'text-anchor':'middle','font-weight':800},[isDone?'✓':String(stop.n)]));
    svg.appendChild(g);
  });
}

// ── Progress ──────────────────────────────────────────────────────────────
function updateProgress(){
  const d=state.done.size, t=STOPS.length;
  document.getElementById('prog-text').textContent=d+' / '+t+' Stände besucht';
  document.getElementById('prog-pct').textContent=Math.round(d/t*100)+'%';
  document.getElementById('prog-fill').style.width=(d/t*100)+'%';
  document.getElementById('stop-dots').innerHTML='';
  STOPS.forEach(s=>{
    const dot=document.createElement('div'); dot.className='stop-dot'+(state.done.has(s.n)?' done':'')+(state.active===s.n?' active':'');
    if(state.active===s.n) dot.style.background=THEME_C[s.t]||HALL[s.h].c;
    dot.textContent=state.done.has(s.n)?'✓':s.n;
    dot.title='#'+s.n+' '+s.f;
    dot.addEventListener('click',()=>{openStop(s.n);switchTab('map');});
    document.getElementById('stop-dots').appendChild(dot);
  });
  document.getElementById('header-meta').textContent=STOPS.length+' Stände · Eingang Ost → Eingang West';
}

// ── Detail Panel ──────────────────────────────────────────────────────────
function openStop(n){
  if(!n){ closePanel(); return; }
  state.active=n;
  const stop=STOPS.find(s=>s.n===n);
  if(!stop) return;
  const color=THEME_C[stop.t]||HALL[stop.h].c;
  const badge=document.getElementById('dp-badge');
  badge.textContent='Stop #'+n+' · '+HALL[stop.h].l;
  badge.style.background=color;
  document.getElementById('dp-hl').style.display=stop.hl?'inline':'none';
  document.getElementById('dp-firm').textContent=stop.f;
  document.getElementById('dp-stand').textContent='Stand '+stop.s;
  document.getElementById('dp-halledesc').textContent=HALL[stop.h].d;
  document.getElementById('dp-thema').textContent=stop.t;
  // Fill dynamic detail content
  const cont=document.getElementById('dp-detail-content');
  cont.innerHTML='';
  cont.appendChild(buildStopDetailContent(n,'panel'));
  // Next hint
  const nh=document.getElementById('dp-next-hint');
  if(n<STOPS.length){
    const nx=STOPS[n]; // index = n (0-based) gives next stop
    nh.innerHTML='<span class="lbl">Nächster Stop → </span>#'+(n+1)+' · '+nx.f+' <span style="color:#999">· '+HALL[nx.h].l+'</span>';
  } else nh.innerHTML='';
  document.getElementById('dp-next-btn').style.display=n<STOPS.length?'':'none';
  const panel=document.getElementById('detail-panel');
  panel.classList.add('open');
  updateProgress(); buildMap();
}
function closePanel(){
  state.active=null;
  document.getElementById('detail-panel').classList.remove('open');
  updateProgress(); buildMap();
}
function toggleDoneActive(){
  if(!state.active) return;
  if(state.done.has(state.active)) state.done.delete(state.active); else state.done.add(state.active);
  saveState(); openStop(state.active);
}
function nextStop(){if(state.active&&state.active<STOPS.length) openStop(state.active+1);}

// ── Tab switching ─────────────────────────────────────────────────────────
function switchTab(tab){
  state.tab=tab;
  ['map','list','custom'].forEach(t=>{
    document.getElementById(t+'-view').classList.toggle('visible',t===tab);
    document.getElementById('btn-'+t).classList.toggle('active',t===tab);
  });
  document.getElementById('stop-bar').style.display=tab==='map'?'flex':'none';
  if(tab==='list') buildStopCards();
  if(tab==='custom') buildCustomList();
}

// ── Stop Cards (List View) ────────────────────────────────────────────────
let listActive=null;
function buildStopCards(){
  // Hall grid
  const hg=document.getElementById('hall-grid'); hg.innerHTML='';
  const hallRows=[{h:'Halle 1,3,5',t:'Regalsysteme·Shuttles·Lager',c:'#2E8BC0'},{h:'Halle 2',t:'Scannsysteme·RFID/AUTO-ID',c:'#1A1A1A'},{h:'Halle 4',t:'LVS/WMS·Software·Simulation',c:'#B8860B'},{h:'Halle 6',t:'Verpackungen·Verpackungsmaschinen',c:'#CC2200'},{h:'Halle 7',t:'Handling·Krane·Verladetechnik',c:'#DAA520'},{h:'Halle 8',t:'Fahrerlose FTS·Robotics·AGV',c:'#E87800'},{h:'Halle 9',t:'Flurförderfahrzeuge·Batterie',c:'#8B4513'},{h:'Halle 10',t:'Flurförderfahrzeuge·Ground Conveyors',c:'#8B4513'}];
  for(const r of hallRows){
    const chip=document.createElement('div'); chip.className='hall-chip';
    const dot=document.createElement('div'); dot.className='hall-chip-dot'; dot.style.background=r.c;
    const info=document.createElement('div');
    const name=document.createElement('div'); name.className='hall-chip-name'; name.textContent=r.h;
    const desc=document.createElement('div'); desc.className='hall-chip-desc'; desc.textContent=r.t;
    info.appendChild(name); info.appendChild(desc);
    chip.appendChild(dot); chip.appendChild(info);
    hg.appendChild(chip);
  }
  // Tagesplan
  const tp=document.getElementById('tagesplan'); tp.innerHTML='';
  for(const [t,d] of TAGESPLAN){
    const row=document.createElement('div'); row.className='tp-row';
    const time=document.createElement('span'); time.className='tp-time'; time.textContent=t;
    const desc=document.createElement('span'); desc.className='tp-desc'; desc.textContent=d;
    row.appendChild(time); row.appendChild(desc); tp.appendChild(row);
  }
  const container=document.getElementById('list-stops');
  container.innerHTML='';
  STOPS.forEach(stop=>{
    const isDone=state.done.has(stop.n);
    const isAct=listActive===stop.n;
    const color=THEME_C[stop.t]||HALL[stop.h].c;
    const hasNote=!!(state.notes[stop.n])||getFotos(stop.n).length>0;
    const card=document.createElement('div');
    card.className='stop-card'+(isAct?' active-card':'');
    card.style.opacity='1';
    const head=document.createElement('div'); head.className='stop-card-head';
    const num=document.createElement('div'); num.className='stop-num';
    num.style.background=isDone?'#4CAF50':color; num.textContent=isDone?'✓':stop.n;
    const info=document.createElement('div'); info.className='stop-info';
    const nr=document.createElement('div'); nr.className='stop-name-row';
    const nm=document.createElement('span'); nm.className='stop-name'+(isDone?' faded':''); nm.textContent=stop.f;
    nr.appendChild(nm);
    if(stop.hl){const hl=document.createElement('span');hl.className='stop-badge-hl';hl.textContent='⭐ Highlight';nr.appendChild(hl);}
    if(hasNote){const nt=document.createElement('span');nt.className='stop-badge-note';nt.textContent='📝';nr.appendChild(nt);}
    const mt=document.createElement('div'); mt.className='stop-meta';
    mt.textContent=HALL[stop.h].l+' · Stand '+stop.s+' · '+stop.t;
    info.appendChild(nr); info.appendChild(mt);
    const ab=document.createElement('button'); ab.className='abhaken-btn'+(isDone?' done':'');
    ab.textContent=isDone?'✓':'Abhaken';
    ab.addEventListener('click',e=>{e.stopPropagation();if(state.done.has(stop.n))state.done.delete(stop.n);else state.done.add(stop.n);saveState();updateProgress();buildStopBar();buildMap();buildStopCards();});
    head.appendChild(num); head.appendChild(info); head.appendChild(ab);
    head.addEventListener('click',()=>{listActive=stop.n;buildStopCards();});
    card.appendChild(head);
    if(isAct){
      const det=document.createElement('div'); det.className='stop-card-detail';
      det.appendChild(buildStopDetailContent(stop.n,'list'));
      card.appendChild(det);
    }
    container.appendChild(card);
  });
}

// ── Stop Bar ──────────────────────────────────────────────────────────────
function buildStopBar(){
  const bar=document.getElementById('stop-bar'); bar.innerHTML='';
  STOPS.forEach(s=>{
    const color=THEME_C[s.t]||HALL[s.h].c;
    const isAct=state.active===s.n;
    const isDone=state.done.has(s.n);
    const btn=document.createElement('button');
    btn.className='stop-bar-btn'+(isAct?' active':'')+(isDone?' sdone':'');
    if(isAct) btn.style.background=color;
    const sHasInfo=!!(state.notes[s.n])||getFotos(s.n).length>0;
    btn.innerHTML='<div class="sb-meta">Stop #'+s.n+'</div>'+'<div class="sb-name">'+(isDone?'✓ ':'')+s.f.split(' ')[0]+'</div><div class="sb-hall">'+HALL[s.h].l+'</div>'+(sHasInfo?'<div class="note-dot"></div>':'');
    btn.addEventListener('click',()=>openStop(s.n));
    bar.appendChild(btn);
  });
}

// ── Legend ────────────────────────────────────────────────────────────────
function buildLegend(){
  const leg=document.getElementById('legend'); leg.innerHTML='';
  const seen=new Set();
  STOPS.forEach(s=>{
    const c=THEME_C[s.t]||HALL[s.h].c;
    const key=c+'|'+HALL[s.h].l;
    if(seen.has(key)) return; seen.add(key);
    const item=document.createElement('div'); item.className='legend-item';
    item.innerHTML='<div class="legend-dot" style="background:'+c+'"></div>'+HALL[s.h].l;
    leg.appendChild(item);
  });
}

// ── Custom Stops ──────────────────────────────────────────────────────────
const CK='custom_r1';
function getCS(){try{return JSON.parse(localStorage.getItem(CK)||'[]');}catch(e){return[];}}
function saveCS(a){try{localStorage.setItem(CK,JSON.stringify(a));showSaveIndicator();}catch(e){}}
let cActive=null, cEdit=null;

function addCustomStop(){
  const name=document.getElementById('cf-name').value.trim();
  if(!name){alert('Bitte Firmenname eingeben.');return;}
  const stops=getCS();
  stops.push({id:Date.now(),name,stand:document.getElementById('cf-stand').value.trim(),thema:document.getElementById('cf-thema').value.trim(),note:document.getElementById('cf-note').value.trim(),done:false});
  saveCS(stops);
  ['cf-name','cf-stand','cf-thema','cf-note'].forEach(id=>document.getElementById(id).value='');
  buildCustomList(); showToast('Hersteller hinzugefügt ✓');
}

function buildCustomList(){
  const container=document.getElementById('custom-list');
  if(!container) return;
  const stops=getCS();
  container.innerHTML='';
  if(!stops.length){
    container.innerHTML='<div class="empty-custom"><div class="icon">🏭</div><p>Noch keine eigenen Hersteller angelegt.</p></div>';
    return;
  }
  stops.forEach((stop,idx)=>{
    const isAct=cActive===stop.id, isEdit=cEdit===stop.id;
    const card=document.createElement('div'); card.className='custom-stop-card'+(isAct?' active-card':'');
    card.style.opacity=stop.done?'0.72':'1';
    // Head
    const head=document.createElement('div'); head.className='custom-card-head';
    const num=document.createElement('div'); num.className='custom-num'+(stop.done?' done':''); num.textContent=stop.done?'✓':(idx+1);
    const info=document.createElement('div'); info.className='custom-info';
    const nm=document.createElement('div'); nm.className='custom-name'; nm.textContent=stop.name;
    const meta=document.createElement('div'); meta.className='custom-meta'; meta.textContent=[stop.stand,stop.thema].filter(Boolean).join(' · ')||'Kein Stand angegeben';
    info.appendChild(nm); info.appendChild(meta);
    const bw=document.createElement('div'); bw.style.cssText='display:flex;gap:4px;flex-shrink:0;';
    const eb=document.createElement('button'); eb.className='custom-edit-btn'; eb.textContent='✏️';
    eb.addEventListener('click',e=>{e.stopPropagation();cEdit=(isEdit?null:stop.id);cActive=stop.id;buildCustomList();});
    const db=document.createElement('button'); db.className='custom-del-btn'; db.textContent='🗑';
    db.addEventListener('click',e=>{e.stopPropagation();const s=getCS().filter(x=>x.id!==stop.id);saveCS(s);if(cActive===stop.id)cActive=null;if(cEdit===stop.id)cEdit=null;buildCustomList();showToast('"'+stop.name+'" gelöscht');});
    bw.appendChild(eb); bw.appendChild(db);
    head.appendChild(num); head.appendChild(info); head.appendChild(bw);
    head.addEventListener('click',()=>{if(isEdit)return;cActive=(isAct?null:stop.id);buildCustomList();});
    card.appendChild(head);
    // Edit form
    if(isEdit){
      const ef=document.createElement('div'); ef.className='custom-card-detail'; ef.style.background='#FAFAFA';
      const etitle=document.createElement('div'); etitle.style.cssText='font-size:11px;font-weight:700;color:#6A0DAD;text-transform:uppercase;padding:10px 0 8px;'; etitle.textContent='✏️ Daten bearbeiten';
      ef.appendChild(etitle);
      [['name','Firmenname',stop.name],['stand','Halle & Stand',stop.stand],['thema','Thema',stop.thema]].forEach(([key,lbl,val])=>{
        const row=document.createElement('div'); row.className='form-row';
        const l=document.createElement('label'); l.textContent=lbl;
        const inp=document.createElement('input'); inp.type='text'; inp.id='ce-'+key+'-'+stop.id; inp.value=val||''; inp.placeholder=lbl;
        inp.addEventListener('click',e=>e.stopPropagation());
        row.appendChild(l); row.appendChild(inp); ef.appendChild(row);
      });
      const nr=document.createElement('div'); nr.className='form-row';
      const nl=document.createElement('label'); nl.textContent='Notizen';
      const ta=document.createElement('textarea'); ta.id='ce-note-'+stop.id; ta.value=stop.note||''; ta.placeholder='Notizen...';
      ta.addEventListener('click',e=>e.stopPropagation());
      nr.appendChild(nl); nr.appendChild(ta); ef.appendChild(nr);
      const sb=document.createElement('button'); sb.className='add-btn'; sb.style.marginTop='4px'; sb.textContent='💾 Speichern';
      sb.addEventListener('click',e=>{
        e.stopPropagation();
        const s=getCS(); const x=s.find(x=>x.id===stop.id);
        if(x){
          const nn=document.getElementById('ce-name-'+stop.id).value.trim();
          if(!nn){alert('Name darf nicht leer sein.');return;}
          x.name=nn; x.stand=document.getElementById('ce-stand-'+stop.id).value.trim();
          x.thema=document.getElementById('ce-thema-'+stop.id).value.trim();
          x.note=document.getElementById('ce-note-'+stop.id).value.trim();
          saveCS(s);
        }
        cEdit=null; buildCustomList(); showToast('Gespeichert ✓');
      });
      ef.appendChild(sb); card.appendChild(ef);
    } else if(isAct){
      const det=document.createElement('div'); det.className='custom-card-detail';
      // Done btn
      const dob=document.createElement('button');
      dob.style.cssText='width:100%;padding:10px;margin:10px 0 8px;border-radius:8px;border:none;font-weight:800;font-size:12px;cursor:pointer;background:'+(stop.done?'#E8F5E9':'#4CAF50')+';color:'+(stop.done?'#2E7D32':'#fff')+';touch-action:manipulation;';
      dob.textContent=stop.done?'✓ Besucht':'Als besucht markieren';
      dob.addEventListener('click',()=>{const s=getCS();const x=s.find(x=>x.id===stop.id);if(x){x.done=!x.done;saveCS(s);buildCustomList();}});
      det.appendChild(dob);
      // Note
      const ni=document.createElement('div'); ni.className='note-inline'; ni.style.marginBottom='8px';
      const nl2=document.createElement('div'); nl2.className='lbl'; nl2.textContent='📝 Notizen';
      const ta2=document.createElement('textarea'); ta2.value=stop.note||''; ta2.placeholder='Notizen...';
      ta2.addEventListener('click',e=>e.stopPropagation());
      ta2.addEventListener('input',e=>{const s=getCS();const x=s.find(x=>x.id===stop.id);if(x){x.note=e.target.value;saveCS(s);showSaveIndicator();}});
      ni.appendChild(nl2); ni.appendChild(ta2); det.appendChild(ni);
      // Kontakt
      const kb=document.createElement('div'); kb.className='kontakt-box';
      const ckid='kw-custom-'+stop.id;
      kb.innerHTML='<div class="lbl">👤 Ansprechpartner</div><div id="'+ckid+'"></div>';
      det.appendChild(kb);
      // Fotos
      const fgId='fg-custom-'+stop.id, fcId='fc-custom-'+stop.id;
      const fb=document.createElement('div'); fb.className='foto-box';
      fb.innerHTML='<div class="lbl">📸 Fotos</div><div class="foto-grid" id="'+fgId+'"></div><div class="foto-count" id="'+fcId+'"></div><div class="foto-btn-row"><button class="foto-btn kamera" onclick="document.getElementById(\'fi-cam-custom-'+stop.id+'\').click()">📷 Foto aufnehmen</button><button class="foto-btn galerie" onclick="document.getElementById(\'fi-gal-custom-'+stop.id+'\').click()">🖼 Aus Galerie</button></div><input type="file" id="fi-cam-custom-'+stop.id+'" accept="image/*" capture="environment" style="display:none" onchange="handleFotoInput(this,\'c'+stop.id+'\')"/><input type="file" id="fi-gal-custom-'+stop.id+'" accept="image/*" style="display:none" onchange="handleFotoInput(this,\'c'+stop.id+'\'">';
      det.appendChild(fb); card.appendChild(det);
      setTimeout(()=>{renderKontaktFields('c'+stop.id,ckid);renderFotoGrid('c'+stop.id,fgId,fcId);},0);
    }
    container.appendChild(card);
  });
}

// ── Export ────────────────────────────────────────────────────────────────
function openExport(){
  const lines=[];
  const routeLabel=document.title.includes('Route 2')?'Route 2 · Tag 2':'Route 1 · Tag 1';
  lines.push('═══════════════════════════════════════');
  lines.push('LogiMAT 2026 — '+routeLabel);
  lines.push('Messe-Zusammenfassung');
  lines.push('═══════════════════════════════════════');
  lines.push('Besucht: '+state.done.size+' / '+STOPS.length+' Stände');
  lines.push('');
  STOPS.forEach(stop=>{
    const isDone=state.done.has(stop.n);
    const note=state.notes[stop.n]||'';
    const k=getKontakt(stop.n);
    const fotos=getFotos(stop.n);
    if(!isDone&&!note&&!k.name&&!k.email&&!fotos.length) return;
    lines.push('───────────────────────────────────────');
    lines.push((isDone?'✓':'○')+' Stop '+stop.n+': '+stop.f);
    lines.push('   Halle '+stop.h+' · Stand '+stop.s);
    if(k.name||k.rolle) lines.push('   👤 '+[k.name,k.rolle].filter(Boolean).join(' — '));
    if(k.email) lines.push('   ✉️  '+k.email);
    if(k.tel)   lines.push('   📞 '+k.tel);
    if(note)    lines.push('   📝 '+note);
    if(fotos.length) lines.push('   📸 '+fotos.length+' Foto(s)');
    lines.push('');
  });
  const cs=getCS();
  if(cs.length){
    lines.push('═══════════════════════════════════════');
    lines.push('Eigene Hersteller');
    lines.push('═══════════════════════════════════════');
    cs.forEach((s,i)=>{
      lines.push((s.done?'✓':'○')+' '+(i+1)+'. '+s.name);
      if(s.stand) lines.push('   Stand: '+s.stand);
      if(s.thema) lines.push('   Thema: '+s.thema);
      if(s.note)  lines.push('   📝 '+s.note);
      lines.push('');
    });
  }
  lines.push('═══════════════════════════════════════');
  lines.push('Exportiert: '+new Date().toLocaleString('de-DE'));
  document.getElementById('export-text').value=lines.join('\n');
  document.getElementById('export-overlay').classList.add('open');
}
function closeExport(){document.getElementById('export-overlay').classList.remove('open');}
function copyExport(){
  const ta=document.getElementById('export-text');
  if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(()=>showToast('📋 Kopiert!'));}
  else{ta.select();document.execCommand('copy');showToast('📋 Kopiert!');}
}
function downloadExport(){
  const text=document.getElementById('export-text').value;
  const rn=document.title.includes('Route 2')?'2':'1';
  const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(text);a.download='LogiMAT_Route'+rn+'.txt';a.click();
}

// ── Toast + Save Indicator ────────────────────────────────────────────────
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._to); t._to=setTimeout(()=>t.classList.remove('show'),2400);
}
let saveTimer=null;
function showSaveIndicator(){
  const el=document.getElementById('save-indicator');
  if(!el) return;
  const now=new Date();
  el.textContent='✓ '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+' gespeichert';
  el.style.opacity='1';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{el.style.opacity='0';},2500);
}
function manualSave(){
  saveState();
  showToast('✓ Alles gespeichert!');
}

// ── Init ──────────────────────────────────────────────────────────────────
loadState();
buildLegend();
buildMap();
updateProgress();
buildStopBar();
buildCustomList();

</script>
